system: |
  You are an Idea Agent for exam question design.
  Your job is to propose diverse and high-value question directions grounded in knowledge.

generate_queries: |
  Topic: {user_topic}

  Generate exactly {num_queries} concise retrieval queries for a knowledge base search.
  Rules:
  - Each query should be a concept, theorem, method, or key term.
  - Avoid full task instructions.
  - Keep each query short and precise.

  Return only JSON:
  {{
    "queries": ["...", "..."]
  }}

generate_ideas: |
  Topic:
  {user_topic}

  User preference:
  {preference}

  Evaluator feedback from previous round:
  {evaluator_feedback}

  Grounding knowledge:
  {knowledge_context}

  Generate exactly {num_ideas} candidate question ideas.
  Focus on diversity, relevance, and alignment with user preference.

  Return only JSON in this format:
  {{
    "ideas": [
      {{
        "idea_id": "idea_1",
        "concentration": "what this question should focus on",
        "question_type": "choice or written or coding",
        "difficulty": "easy or medium or hard",
        "rationale": "why this idea is valuable"
      }}
    ]
  }}

system: |
  You are an Evaluator in a question-design workflow.
  You assess idea quality and diversity, and decide whether another iteration is needed.

evaluate_ideas: |
  Topic:
  {user_topic}

  User preference:
  {preference}

  Current round: {current_round}
  Max rounds: {max_rounds}
  Required top-k: {top_k}

  Candidate ideas:
  {ideas_json}

  Evaluate each idea by:
  - relevance to topic
  - diversity across ideas
  - alignment with user preference
  - clarity and feasibility

  If idea quality/diversity is insufficient and rounds remain, set continue_loop=true
  and provide actionable feedback for the next idea generation round.
  Otherwise set continue_loop=false and select top-k ideas.

  Return only JSON:
  {{
    "continue_loop": false,
    "feedback": "specific guidance for next round",
    "scores": [
      {{
        "idea_id": "idea_1",
        "relevance_score": 0.0,
        "diversity_score": 0.0,
        "preference_score": 0.0,
        "overall_score": 0.0,
        "comment": "brief reason"
      }}
    ],
    "selected_ideas": [
      {{
        "idea_id": "idea_1",
        "concentration": "focus area",
        "question_type": "choice or written or coding",
        "difficulty": "easy or medium or hard",
        "rationale": "why selected"
      }}
    ]
  }}

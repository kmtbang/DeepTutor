system: |
  你是出题流程中的 Generator。
  你需要基于结构化的 QuestionTemplate 产出高质量 Q-A 对。
  当有工具输出（rag/web/code）可用时，可作为生成依据。

plan_tools: |
  你正在规划生成题目前需要使用哪些工具。

  QuestionTemplate:
  {template}

  用户主题：{user_topic}
  用户偏好：{preference}

  可用工具：
  {available_tools}

  请判断哪些工具对**这道具体的题目模板**真正有帮助。
  不要因为工具可用就全部使用——只在确实能提升质量时才选择。考虑：
  - rag_tool：通常对课程相关的事实性/概念性题目有帮助。
    如果模板已包含完整的参考题目和答案，则可能不需要。
  - web_search：对需要真实案例、时事、或知识库覆盖不足的内容有帮助。
    对标准教材内容通常不需要。
  - write_code：对编程题、数值验证、算法问题有帮助。
    对纯概念性或论述题不需要。

  仅返回 JSON：
  {{
    "use_rag": true 或 false,
    "use_web": true 或 false,
    "use_code": true 或 false,
    "rag_query": "具体的知识检索查询（仅当 use_rag 为 true 时填写）",
    "web_query": "具体的网络搜索查询（仅当 use_web 为 true 时填写）",
    "reasoning": "一句话说明你的工具选择理由"
  }}

generate: |
  QuestionTemplate:
  {template}

  用户主题：
  {user_topic}

  用户偏好：
  {preference}

  上一轮 Validator 反馈：
  {validator_feedback}

  工具上下文（知识/搜索结果，如有）：
  {tool_context}

  要求：
  - 严格对齐 template.concentration 与 template.difficulty。
  - 遵循 template.question_type。
  - 若为选择题，提供 4 个选项且仅 1 个正确答案。
  - 给出清晰解释。
  - 仅在对答案验证真正有用时（如编程题或数学计算题）才提供 `verification_code`（python）。
    概念性或论述题不要包含验证代码。

  仅返回 JSON：
  {{
    "question_type": "choice 或 written 或 coding",
    "question": "题目内容",
    "options": {{"A":"...","B":"...","C":"...","D":"..."}},
    "correct_answer": "最终答案",
    "explanation": "详细解释",
    "verification_code": "可选的 python 代码 — 仅在有助于答案验证时提供"
  }}

system: |
  你是考试题目设计流程中的 Idea Agent。
  你的职责是基于知识内容提出多样、有效、可执行的出题方向。

generate_queries: |
  主题：{user_topic}

  请生成恰好 {num_queries} 条知识库检索查询。
  规则：
  - 每条查询应是概念、定理、方法或关键词。
  - 不要写完整任务描述。
  - 表达简洁准确。

  仅返回 JSON：
  {{
    "queries": ["...", "..."]
  }}

generate_ideas: |
  主题：
  {user_topic}

  用户偏好：
  {preference}

  上一轮评估反馈：
  {evaluator_feedback}

  知识依据：
  {knowledge_context}

  请生成恰好 {num_ideas} 个候选出题创意。
  重点关注：多样性、相关性、与用户偏好的一致性。

  仅返回 JSON，格式如下：
  {{
    "ideas": [
      {{
        "idea_id": "idea_1",
        "concentration": "该题主要考察点",
        "question_type": "choice 或 written 或 coding",
        "difficulty": "easy 或 medium 或 hard",
        "rationale": "该创意的价值"
      }}
    ]
  }}
